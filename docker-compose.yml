services:
  app:
    build: .
    container_name: pocket-alchemy-app
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: pocket-alchemy-nginx
    restart: unless-stopped
    ports:
      - "7789:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
